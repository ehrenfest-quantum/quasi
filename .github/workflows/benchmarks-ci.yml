name: Benchmarks CI

on:
  push:
    branches: [main]
    paths:
      - "benchmarks/**"
      - ".github/workflows/benchmarks-ci.yml"
  pull_request:
    paths:
      - "benchmarks/**"
      - ".github/workflows/benchmarks-ci.yml"

jobs:
  simulator-benchmarks:
    name: "benchmarks (simulator)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run simulator benchmark suite
        run: python3 benchmarks/run_benchmarks.py --backend sim

      - name: Render markdown report
        run: python3 benchmarks/report.py

      - name: Validate benchmark helpers
        run: pytest -q benchmarks/test_benchmarks.py
