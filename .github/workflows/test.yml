name: Package Tests

on:
  push:
    branches: [main]
    paths:
      - "afana/**"
      - "quasi-board/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "afana/**"
      - "quasi-board/**"
      - ".github/workflows/test.yml"

jobs:
  afana:
    name: "afana (Rust)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-afana-${{ hashFiles('afana/Cargo.toml') }}

      - name: Clippy
        run: cargo clippy -p afana -- -D warnings

      - name: Test
        run: cargo test -p afana --verbose

  quasi-board:
    name: "quasi-board tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install quasi-board test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r quasi-board/requirements.txt pytest pytest-anyio anyio[asyncio]

      - name: Run quasi-board tests
        run: pytest quasi-board/tests/ -v --tb=short
