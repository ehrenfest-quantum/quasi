# QUASI — Unified CI
#
# Pauli-Test axiom: no layer gets special treatment.
# All four testing layers run on every push and PR,
# on the same runner, with the same timeout budget.
# Every layer must pass for a PR to be mergeable.
#
# Layers
# ──────
# spec   → Ehrenfest CBOR schema validation (spec/)
# board  → quasi-board pytest suite (ActivityPub + ledger logic)
# mcp    → quasi-mcp TypeScript build + type-check
# agent  → quasi-agent Python lint + smoke-test

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:


# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Layer 0: Ehrenfest Spec / CBOR Schema ──────────────────────────────────
  python:
    name: "Layer 0 · Ehrenfest spec"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install cbor2

      - name: Validate CBOR examples against schema
        run: python3 spec/tools/validate.py spec/examples/

      - name: Check for generator drift
        run: |
          cp spec/examples/transverse_ising_2q.cbor.hex   /tmp/ising.bak
          cp spec/examples/rabi_oscillation_1q.cbor.hex   /tmp/rabi.bak
          cp spec/examples/heisenberg_4q.cbor.hex         /tmp/heisenberg.bak
          python3 spec/tools/generate_examples.py
          diff spec/examples/transverse_ising_2q.cbor.hex /tmp/ising.bak       || (echo "❌ CBOR drift in transverse_ising_2q" && exit 1)
          diff spec/examples/rabi_oscillation_1q.cbor.hex /tmp/rabi.bak        || (echo "❌ CBOR drift in rabi_oscillation_1q"  && exit 1)
          diff spec/examples/heisenberg_4q.cbor.hex       /tmp/heisenberg.bak  || (echo "❌ CBOR drift in heisenberg_4q"        && exit 1)
          echo "✅ All CBOR examples match generator output"

  # ── Layer 1: quasi-board (ActivityPub + ledger) ────────────────────────────
  board:
    name: "Layer 1 · quasi-board"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        working-directory: quasi-board
        run: pip install -r requirements.txt pytest pytest-anyio anyio[asyncio]

      - name: Lint (flake8)
        run: |
          pip install --quiet flake8
          flake8 quasi-board/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,.git

      - name: Run pytest
        working-directory: quasi-board
        run: pytest tests/ -v --tb=short

  # ── Layer 2: quasi-mcp (TypeScript build + type-check) ────────────────────
  mcp:
    name: "Layer 2 · quasi-mcp"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: quasi-mcp/package-lock.json

      - name: Install deps
        working-directory: quasi-mcp
        run: npm ci --ignore-scripts

      - name: Type-check (tsc --noEmit)
        working-directory: quasi-mcp
        run: npx tsc --noEmit

      - name: Build
        working-directory: quasi-mcp
        run: npm run build

  # ── Layer 3: quasi-agent (Python lint + smoke-test) ───────────────────────
  agent:
    name: "Layer 3 · quasi-agent"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet flake8 mypy pytest argcomplete requests

      - name: Lint (flake8)
        run: |
          flake8 quasi-agent/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,.git

      - name: Syntax check
        run: |
          python -m py_compile quasi-agent/cli.py
          python -m py_compile quasi-agent/generate_issue.py
          echo "✅ Syntax OK"

      - name: Smoke-test CLI entry-points
        run: |
          python3 quasi-agent/cli.py --help > /dev/null
          python3 quasi-agent/generate_issue.py --list-models
          echo "✅ CLI loads cleanly"


  # ── Afana compiler (Rust) ──────────────────────────────────────────────────
  afana:
    name: "Afana · Rust compiler"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-afana-${{ hashFiles('afana/Cargo.toml') }}

      - name: Clippy
        run: cargo clippy -p afana -- -D warnings

      - name: Test
        run: cargo test -p afana --verbose

  # ── Quality Radar ①: Compiler boundary — Rust only, no vendor SDKs ───────
  compiler-boundary:
    name: "Quality Radar ① · Compiler boundary"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check no Python files in afana/
        run: |
          # Afana is a Rust crate. No Python files allowed. See CLAUDE.md.
          PY_FILES=$(find afana/ -name "*.py" 2>/dev/null || true)
          if [ -n "$PY_FILES" ]; then
            echo "❌ LANGUAGE VIOLATION: Python files found in afana/"
            echo ""
            echo "$PY_FILES"
            echo ""
            echo "Afana is written exclusively in Rust. See CLAUDE.md."
            exit 1
          fi
          echo "✅ No Python files in afana/"

      - name: Check no vendor SDK deps in afana/Cargo.toml
        run: |
          # Afana is a compiler. It emits OpenQASM. It never talks to hardware.
          BANNED="qiskit|cirq|pennylane|pytket|braket|pyquil|pyo3"
          HITS=$(grep -n -E "$BANNED" afana/Cargo.toml || true)
          if [ -n "$HITS" ]; then
            echo "❌ COMPILER BOUNDARY VIOLATION: vendor SDK dep in afana/Cargo.toml"
            echo ""
            echo "$HITS"
            echo ""
            echo "Vendor SDKs belong in hal-drivers/<vendor>/, not in the compiler."
            exit 1
          fi
          echo "✅ Compiler boundary clean — no vendor SDK deps in afana/"

  # ── Quality Radar ②: Scope Hygiene ────────────────────────────────────────
  scope:
    name: "Quality Radar ① · Scope Hygiene"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scope hygiene check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 spec/tools/scope_hygiene.py

  afana-qasm3:
    name: "Afana · QASM3 regression tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet pytest

      - name: Run QASM3 regression tests
        working-directory: afana/tests/qasm3
        run: pytest -v --tb=short

  # ── Summary gate ───────────────────────────────────────────────────────────
  # Branch protection should require THIS job only.
  # It passes when all four layer jobs pass.
  all-layers:
    name: "All layers passed"
    needs: [python, board, mcp, agent, afana, compiler-boundary, scope]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all layers
        run: |
          if [[ "${{ needs.python.result }}"             != "success" ||
                "${{ needs.board.result }}"              != "success" ||
                "${{ needs.mcp.result }}"                != "success" ||
                "${{ needs.agent.result }}"              != "success" ||
                "${{ needs.afana.result }}"              != "success" ||
                "${{ needs.compiler-boundary.result }}"  != "success" ]]; then
            echo "❌ One or more layers failed:"
            echo "  python:            ${{ needs.python.result }}"
            echo "  board:             ${{ needs.board.result }}"
            echo "  mcp:               ${{ needs.mcp.result }}"
            echo "  agent:             ${{ needs.agent.result }}"
            echo "  afana:             ${{ needs.afana.result }}"
            echo "  compiler-boundary: ${{ needs.compiler-boundary.result }}"
            exit 1
          fi
          # scope job only runs on pull_request; skip check on push
          if [[ "${{ github.event_name }}" == "pull_request" &&
                "${{ needs.scope.result }}"  != "success" ]]; then
            echo "❌ Scope hygiene failed: ${{ needs.scope.result }}"
            exit 1
          fi
          echo "✅ All layers passed — Pauli-Test objective criterion met"