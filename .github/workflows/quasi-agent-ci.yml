
name: quasi-agent-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r quasi-agent/requirements.txt
      - name: Run pytest
        run: |
          pip install --quiet pytest
          pytest quasi-agent/cli.py --exitfirst
          pytest quasi-agent/generate_issue.py --exitfirst
          echo "✅ quasi-agent tests passed"
