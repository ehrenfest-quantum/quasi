name: QASM3 Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions/setup-rust@v2
        with:
          rust-version: stable
          components: cargo

      - name: Run tests (including QASM3 edge case validation)
        run: cargo test --all --quiet
