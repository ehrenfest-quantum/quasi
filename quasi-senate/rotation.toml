# QUASI Senate Rotation Roster
#
# External rotation file — edit this to add/remove models without recompiling.
# Place at /home/vops/quasi-senate-rotation.toml on the server.
# Falls back to the embedded copy if external file is absent.
#
# Role assignment rationale (from quasi-senate-loop.md §2):
#   - Reasoning specialists → a1_council, a2_drafter, a3_gate, b2_reviewer
#   - Coding specialists    → a2_drafter, b1_solver
#   - General / regional    → a2_drafter, b1_solver (default)
#   - Review-only           → a1_council, a3_gate, b2_reviewer
#
# Cost preference: prefer Groq (free tier) and HuggingFace (free, rate-limited)
# for review roles (small token budgets); flagship OpenRouter models for B.1
# solving (8K output needed). Fireworks is pay-per-token.

# ── Tier 1 — Strong coding (OpenRouter) ──────────────────────────────────────

